<div
  style="margin:0;padding:16px 0;font-family:Arial,sans-serif;background-color:#f4f4f4;color:#333;width:100%;height:100%;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
    style="max-width:600px;margin:0 auto;background-color:#ffffff;border-radius:8px;overflow:hidden;">
    <tr>
      <td style="padding:30px 30px 20px 30px;text-align:center;border-bottom:3px solid #512fff;">
        <img src="cid:logo_cid" alt="Metro One Logo" width="200" height="auto"
          style="display:block;margin:0 auto;max-width:100%;height:auto;" />
      </td>
    </tr>
    <tr>
      <td style="padding:30px 30px 20px 30px;background-color:#ffffff;">
        <h1 style="margin:0 0 20px 0;font-size:24px;line-height:30px;color:#1a1a1a;font-weight:bold;">Password Reset
          Request</h1>
        <p style="margin:0 0 20px 0;font-size:16px;line-height:24px;color:#555;">We received a request to reset your
          password. Click the button below to choose a new one.</p>
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:30px auto;">
          <tr>
            <td style="border-radius:4px;background-color:#512fff;text-align:center;">
              <a href="{{url}}" target="_blank"
                style="background-color:#512fff;border:none;color:#ffffff;padding:14px 35px;text-decoration:none;font-size:16px;font-weight:bold;border-radius:4px;display:inline-block;">Reset
                Password</a>
            </td>
          </tr>
        </table>
        <p style="margin:0 0 20px 0;font-size:14px;line-height:20px;color:#555;">This link will expire in 10 minutes.
        </p>
      </td>
    </tr>
  </table>
</div>
