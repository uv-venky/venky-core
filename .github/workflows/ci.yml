name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: pnpm

      # @uv-venky/* deps resolve from GitHub Packages (see .npmrc). The default
      # GITHUB_TOKEN has packages:read, which is enough to install.
      - name: Authenticate GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint:all
      - run: pnpm test --run

      # Fail if the checked-in action param schemas are stale (regenerate locally
      # with `pnpm codegen:action-params`).
      - run: pnpm codegen:action-params:check
